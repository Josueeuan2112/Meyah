name: CI

# Gate de calidad antes de mergear/desplegar: type-check con el tsconfig correcto
# (tsconfig.app.json — el raíz es solution-style y no revisa nada), lint y build.
on:
  push:
    branches: [main, V2-meyah]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Valores dummy: el build solo necesita que las VITE_* existan para no
          # caer en el fatalConfigError. No son secretos reales.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: dummy-anon-key-for-build
